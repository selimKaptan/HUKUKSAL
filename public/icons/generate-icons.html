<!DOCTYPE html>
<html>
<head><title>JusticeGuard Icon Generator</title></head>
<body>
<h1>JusticeGuard PWA Icon Generator</h1>
<p>Bu sayfayı tarayıcıda açıp ikonları indirin, veya aşağıdaki SVG'yi online PNG converter ile dönüştürün.</p>
<canvas id="canvas"></canvas>
<div id="links"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const linksDiv = document.getElementById('links');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#4f46e5');
  gradient.addColorStop(1, '#3b82f6');

  // Rounded rect background
  const radius = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Scale icon (simplified)
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.04;
  ctx.lineCap = 'round';

  const cx = size / 2;
  const cy = size / 2;
  const s = size * 0.25;

  // Vertical line
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.lineTo(cx, cy + s);
  ctx.stroke();

  // Horizontal bar
  ctx.beginPath();
  ctx.moveTo(cx - s, cy - s * 0.4);
  ctx.lineTo(cx + s, cy - s * 0.4);
  ctx.stroke();

  // Left bowl
  ctx.beginPath();
  ctx.arc(cx - s * 0.65, cy + s * 0.2, s * 0.35, 0, Math.PI);
  ctx.stroke();

  // Right bowl
  ctx.beginPath();
  ctx.arc(cx + s * 0.65, cy + s * 0.2, s * 0.35, 0, Math.PI);
  ctx.stroke();

  // Base
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.4, cy + s);
  ctx.lineTo(cx + s * 0.4, cy + s);
  ctx.stroke();

  // JG text
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `bold ${size * 0.12}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('JG', cx, cy + s + size * 0.12);

  const link = document.createElement('a');
  link.download = `icon-${size}x${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${size}x${size}`;
  link.style.display = 'block';
  link.style.margin = '8px';
  linksDiv.appendChild(link);
});
</script>
</body>
</html>
